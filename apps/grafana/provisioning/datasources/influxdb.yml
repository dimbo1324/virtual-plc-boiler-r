apiVersion: 1

datasources:
  - name: InfluxDB-Boiler
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: boiler_org
      defaultBucket: telemetry
    secureJsonData:
      token: supersecret-token-1234567890abcdef
    isDefault: true