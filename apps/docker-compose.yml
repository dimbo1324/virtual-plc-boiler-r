version: "3.8"

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - boiler-net

  physics-service:
    build:
      context: ./physics-service
      dockerfile: Dockerfile
    container_name: physics-service
    restart: unless-stopped
    ports:
      - "50051:50051"
    networks:
      - boiler-net
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: [
          "CMD-SHELL",
          "python -c \"import socket,sys; \
          socket.create_connection(('127.0.0.1', 50051), timeout=2)\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  plc-service:
    build:
      context: ./plc-service
      dockerfile: Dockerfile
    container_name: plc-service
    restart: unless-stopped
    ports:
      - "4840:4840"
    networks:
      - boiler-net
    environment:
      - PHYSICS_ADDR=physics-service:50051
    depends_on:
      physics-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4840 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    restart: unless-stopped
    depends_on:
      plc-service:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - boiler-net
    environment:
      - OPCUA_ENDPOINT=opc.tcp://plc-service:4840
      - MQTT_BROKER=tcp://mosquitto:1883
      - MQTT_CLIENT_ID=gw_01
      - USE_MOCKS=false
      - WORKER_COUNT=5
      - BUFFER_SIZE=500
      - POLL_INTERVAL_MS=500

networks:
  boiler-net:
    driver: bridge
