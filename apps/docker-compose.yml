services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - boiler-net

  physics-service:
    build: ./physics-service
    container_name: physics-service
    restart: unless-stopped
    ports:
      - "50051:50051"
    networks:
      - boiler-net
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import socket; socket.create_connection((''127.0.0.1'', 50051), 2)" || exit 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  plc-service:
    build: ./plc-service
    container_name: plc-service
    restart: unless-stopped
    ports:
      - "4840:4840"
    networks:
      - boiler-net
    environment:
      - PHYSICS_ADDR=physics-service:50051
    depends_on:
      physics-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4840 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    restart: unless-stopped
    depends_on:
      plc-service:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - boiler-net
    environment:
      - OPCUA_ENDPOINT=opc.tcp://plc-service:4840
      - MQTT_BROKER=tcp://mosquitto:1883
      - MQTT_CLIENT_ID=gw_01
      - USE_MOCKS=false
      - WORKER_COUNT=5
      - BUFFER_SIZE=500
      - POLL_INTERVAL_MS=500

  influxdb:
    image: influxdb:2-alpine
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin12345678
      - DOCKER_INFLUXDB_INIT_ORG=boiler_org
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=supersecret-token-1234567890abcdef
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - boiler-net
    healthcheck:
      test: ["CMD-SHELL", "influx ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - boiler-net
    depends_on:
      - influxdb

  data-consumer:
    build: ./data-consumer
    container_name: data-consumer
    restart: unless-stopped
    networks:
      - boiler-net
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=supersecret-token-1234567890abcdef
      - INFLUX_ORG=boiler_org
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_TOPIC=v1/devices/boiler/telemetry
    depends_on:
      mosquitto:
        condition: service_started
      influxdb:
        condition: service_healthy

networks:
  boiler-net:
    driver: bridge

volumes:
  influxdb-data:
  grafana-data:
